services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miniipam}
      POSTGRES_USER: ${POSTGRES_USER:-miniipam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-miniipam}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miniipam} -d ${POSTGRES_DB:-miniipam}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: mini-ipam
      ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-miniipam}:${POSTGRES_PASSWORD:-miniipam}@db:5432/${POSTGRES_DB:-miniipam}
      SQLITE_DEV_MODE: "false"
      SECRET_KEY: ${SECRET_KEY:-change_me}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pg_data:
  uploads_data:

